<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مخطوطة رحلة مدارس العربي الخاصة</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=Amiri:wght@700&family=Noto+Sans+Egyptian+Hieroglyphs&display=swap" rel="stylesheet">
    
    <style>
        .school-trip-container {
            background-color: #0c0000;
            background-image: 
                linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                url('https://www.transparenttextures.com/patterns/papyrys-dark.png');
            color: #d4af37;
            font-family: 'Amiri', serif;
            padding: 80px 20px;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
        }

        body { margin: 0; padding: 0; }

        .hieroglyphs-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            font-family: 'Noto Sans Egyptian Hieroglyphs', serif;
            font-size: 4em;
            opacity: 0.15;
            color: #d4af37;
            z-index: 1;
            pointer-events: none;
            line-height: 1.1;
            text-align: center;
            word-wrap: break-word;
            padding: 10px;
        }

        .content-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1100px;
            text-align: center;
        }

        .school-name {
            color: #fff;
            font-size: 3.5em;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            margin-bottom: 10px;
        }

        .hero-section {
            background: linear-gradient(135deg, #4e361b 0%, #d4af37 50%, #4e361b 100%);
            padding: 35px;
            border-radius: 10px;
            margin: 30px auto 60px auto;
            border: 2px solid #6b4c2b;
            box-shadow: 0 15px 40px rgba(0,0,0,0.9);
        }

        .hero-title {
            font-family: 'Cinzel Decorative', cursive;
            color: #0c0000;
            font-size: 3.5em;
            margin: 0;
        }

        .destination-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
        }

        .dest-card {
            background: rgba(20, 20, 20, 0.95);
            border: 2px solid #6b4c2b;
            border-radius: 5px;
            padding: 40px 25px;
            width: 250px;
            transition: 0.4s;
        }

        .dest-card:hover {
            transform: scale(1.05);
            border-color: #d4af37;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.5);
        }

        .hieroglyphic-icon {
            font-family: 'Noto Sans Egyptian Hieroglyphs', serif;
            font-size: 3.5em;
            display: block;
            margin-bottom: 20px;
            color: #d4af37;
            filter: drop-shadow(0 0 5px #d4af37);
        }

        .dest-card h3 {
            color: #fff;
            font-size: 2.1em;
            margin-bottom: 15px;
            border-bottom: 1px solid #4e361b;
            padding-bottom: 10px;
        }

        .dest-card p {
            color: #b0b0b0;
            font-size: 1.2em;
        }

        .contact-footer {
            margin-top: 80px;
            padding: 40px;
            border: 1px double rgba(212, 175, 55, 0.3);
            border-radius: 50px;
        }

        .whatsapp-btn {
            font-size: 80px;
            color: #25D366;
            text-decoration: none;
            transition: 0.3s;
        }

        .signature {
            font-family: 'Segoe UI', sans-serif;
            font-weight: 200;
            font-size: 0.95em;
            letter-spacing: 4px;
            color: rgba(212, 175, 55, 0.4);
            margin-top: 100px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<div class="school-trip-container">
    <div class="hieroglyphs-bg">
